<!-- capture the CSS content as a Nunjucks variable -->
{% set css %}
	{% include "css/variables.css" %}
	{% include "css/elements.css" %}
	{% include "css/cards.css" %}
	{% include "css/buttons.css" %}
{% endset %}
<!-- feed it through our cssmin filter to minify -->
<style>
	{{ css | cssmin | safe }}
</style>
